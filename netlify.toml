[build]
  command = "(npx drizzle-kit push || echo 'DB push skipped, continuing build...') && (node --import=tsx scripts/seed-admin.ts || echo 'Seed skipped, continuing build...') && (node --import=tsx scripts/seed-real-content.ts || echo 'Content seed skipped, continuing build...') && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
