<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" fill="#EAF3FF"/>

  <!-- Subtle inner gradient circle (shoulder area fill) -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C6E2FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EAF3FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Head -->
  <circle cx="100" cy="76" r="28" fill="#BFDBFE"/>

  <!-- Body / shoulders -->
  <ellipse cx="100" cy="160" rx="52" ry="38" fill="#BFDBFE"/>

  <!-- Overlay to crop body at bottom edge cleanly -->
  <rect x="0" y="174" width="200" height="26" fill="#EAF3FF"/>

  <!-- Head highlight (subtle depth) -->
  <circle cx="92" cy="70" r="10" fill="#DBEAFE" fill-opacity="0.5"/>
</svg>
